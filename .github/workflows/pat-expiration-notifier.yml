name: Notify Token Expiry

on:
  repository_dispatch:
    types:
      - pat_expiring
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text": "🚨 Token Expiring: *${{ github.event.token_name }}* will expire on `${{ github.event.expires_at }}`. Please renew it."
          }' \
          $SLACK_WEBHOOK_URL
