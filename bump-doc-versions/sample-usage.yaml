# Sample usage for bump-doc-versions.
#
# Two caller workflows per product. Copy each into the appropriate repo under
# .github/workflows/, replacing <PRODUCT> with `scalardb` or `scalardl`.

# ─── ①  Public repo:  docs-scalardb/.github/workflows/trigger-version-bump.yml ─
# Fires on any push to `main` that touches `docusaurus.config.js`. Detects a
# `className` diff, then:
#   (a) dispatches into the internal repo for the authoritative bump PR, and
#   (b) runs a safety-net bump against the public repo itself (idempotent —
#       becomes a no-op if the internal sync PR lands first).

name: 🔢 Trigger version bump on className change

on:
  push:
    branches: [main]
    paths: [docusaurus.config.js]
  workflow_dispatch:
    inputs:
      minor:
        description: 'Minor version entry to bump (for example, "3.17", or "current" for whichever minor is currently labeled `current`)'
        required: true
        type: string
      to:
        description: 'New patch version to bump to (e.g., "3.18.2"). This is the version the docs will now reference.'
        required: true
        type: string
      from:
        description: 'Current patch version to bump from (e.g., "3.18.1"). Optional: Auto-detected from `className` (in the docs site config) or the first anchored match (in this repo) when omitted.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      bumps: ${{ steps.diff.outputs.bumps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Checkout detect-classname-diff script
        uses: actions/checkout@v4
        with:
          repository: josh-wong/actions
          ref: main
          sparse-checkout: bump-doc-versions
          path: actions-tools

      - name: Extract before/after docusaurus.config.js
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA:  ${{ github.event.after }}
        run: |
          git show "$BEFORE_SHA:docusaurus.config.js" > /tmp/before.js 2>/dev/null || : > /tmp/before.js
          git show "$AFTER_SHA:docusaurus.config.js"  > /tmp/after.js

      - name: Detect className diffs
        id: diff
        run: |
          bumps=$(node actions-tools/bump-doc-versions/detect-classname-diff.mjs \
            --before /tmp/before.js \
            --after  /tmp/after.js)
          echo "bumps=$bumps" >> "$GITHUB_OUTPUT"
          echo "Detected: $bumps"

  dispatch-internal:
    needs: detect
    if: needs.detect.outputs.bumps != '' && needs.detect.outputs.bumps != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bump: ${{ fromJson(needs.detect.outputs.bumps) }}
    steps:
      - name: Dispatch bump into docs-internal-<PRODUCT>
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BUMP_DISPATCH_PAT }}
          script: |
            const bump = ${{ toJson(matrix.bump) }};
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  'docs-internal-<PRODUCT>',
              event_type: 'bump-patch',
              client_payload: { product: '<PRODUCT>', ...bump },
            });

  safety-net-public:
    needs: detect
    if: needs.detect.outputs.bumps != '' && needs.detect.outputs.bumps != '[]'
    strategy:
      matrix:
        bump: ${{ fromJson(needs.detect.outputs.bumps) }}
    uses: josh-wong/actions/.github/workflows/bump-doc-versions-reusable.yaml@main
    with:
      product:     <PRODUCT>
      repo:        public
      minor:       ${{ matrix.bump.minor }}
      from:        ${{ matrix.bump.from }}
      to:          ${{ matrix.bump.to }}
      base_branch: main
      head_branch: bump/<PRODUCT>-${{ matrix.bump.to }}
      pr_title:    "chore: bump ${{ matrix.bump.from }} → ${{ matrix.bump.to }} (safety net)"
      pr_body_style: public-safety-net
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  manual:
    if: github.event_name == 'workflow_dispatch'
    uses: josh-wong/actions/.github/workflows/bump-doc-versions-reusable.yaml@main
    with:
      product:     <PRODUCT>
      repo:        public
      minor:       ${{ inputs.minor }}
      from:        ${{ inputs.from }}
      to:          ${{ inputs.to }}
      base_branch: main
      head_branch: bump/<PRODUCT>-${{ inputs.to }}
      pr_title:    "chore: bump ${{ inputs.from }} → ${{ inputs.to }} (manual)"
      pr_body_style: public-safety-net
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

---
# ─── ②  Internal repo: docs-internal-<PRODUCT>/.github/workflows/bump-doc-versions.yml
# Runs on repository_dispatch from the public repo, or on manual
# workflow_dispatch. Targets the matching version branch and opens a PR
# against it. For workflow_dispatch to work from a version branch, this
# file must exist on every active version branch (e.g., 3.14–3.18) — the
# 'Use workflow from' dropdown then supplies the minor via github.ref_name.

name: 🔢 Bump patch version in docs

on:
  repository_dispatch:
    types: [bump-patch]
  workflow_dispatch:
    inputs:
      to:
        description: 'New patch version to bump to (e.g., "3.18.2"). This is the version the docs will now reference.'
        required: true
        type: string
      from:
        description: 'Current patch version to bump from (e.g., "3.18.1"). Optional: Auto-detected from `className` (in the docs site config) or the first anchored match (in this repo) when omitted.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Report only; do not commit / push / open PR'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    uses: josh-wong/actions/.github/workflows/bump-doc-versions-reusable.yaml@main
    with:
      product:     <PRODUCT>
      repo:        internal
      minor:       ${{ github.event.client_payload.minor || github.ref_name }}
      to:          ${{ github.event.client_payload.to    || inputs.to }}
      from:        ${{ github.event.client_payload.from  || inputs.from }}
      base_branch: ${{ github.event.client_payload.minor || github.ref_name }}
      head_branch: update-${{ github.event.client_payload.minor || github.ref_name }}-patch-version-to-${{ github.event.client_payload.to || inputs.to }}
      pr_title: "[${{ github.event.client_payload.minor || github.ref_name }}] Change patch version from `${{ github.event.client_payload.from || inputs.from }}` to `${{ github.event.client_payload.to || inputs.to }}`"
      pr_body_style: internal
      dry_run: ${{ inputs.dry_run || false }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
